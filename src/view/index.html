<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrantes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .nome {
            font-size: 20px;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            background: #f0f0f0;
            transition: 0.3s;
        }

        .nome:hover {
            background: #4facfe;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
          <h1>Bem-vindo!</h1>
        <h1>Integrantes</h1>

        <div class="nome">Maisa Carolliny Grundler</div>
        <div class="nome">Isadora Custodio Lopes</div>
        <div class="nome">Hevelyn Leivas</div>

    </div>
</body>
</html>
